<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Клиенты — Mentori CRM</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <div class="app">
    <div data-component="sidebar" data-active="clients"></div>

    <div class="main">
      <div data-component="header" data-title="Клиенты"></div>

      <main class="content">
        <div class="page-title">
          <div>
            <h1>Клиентская база</h1>
            <p>Заказано / сделано — управляем кнопками <span style="color:var(--accent);font-weight:600">+</span> и <span style="color:var(--accent);font-weight:600">−</span>. Тариф меняется в строке.</p>
          </div>
          <button class="btn btn--primary" id="btnAdd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить клиента
          </button>
        </div>

        <section class="cards" id="clKpis"></section>

        <div class="filters">
          <select id="fTariff" class="select">
            <option value="">Все тарифы</option>
          </select>
          <select id="fState" class="select">
            <option value="">Все</option>
            <option value="overdue">Просрочено</option>
            <option value="active">В работе</option>
            <option value="done">Завершённые</option>
            <option value="unpaid">Есть долг</option>
          </select>
          <input type="text" id="fSearch" class="input" placeholder="Поиск по имени, коду..." style="flex:1;min-width:200px"/>
          <button class="btn btn--ghost" id="btnReset">Сбросить</button>
        </div>

        <div class="panel">
          <div class="table-wrap">
            <table class="table" id="clTable">
              <thead>
                <tr>
                  <th>Код</th>
                  <th>Клиент</th>
                  <th>Площадка</th>
                  <th>Тариф</th>
                  <th class="num">Заказано</th>
                  <th class="num">Сделано</th>
                  <th class="num">Прогресс</th>
                  <th class="num">Оплачено</th>
                  <th class="num">Остаток</th>
                  <th>Дедлайн</th>
                  <th>Сотрудник</th>
                  <th>Статус</th>
                  <th class="actions"></th>
                </tr>
              </thead>
              <tbody id="clRows"></tbody>
              <tfoot id="clFoot"></tfoot>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Модалка -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal" style="max-width:560px">
      <div class="modal__header">
        <h3>Новый клиент</h3>
        <button class="btn--icon" data-close>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="field-row">
          <div class="field">
            <label for="mName">Имя / Название</label>
            <input type="text" id="mName" class="input" placeholder="Напр. Никита Авито"/>
          </div>
          <div class="field">
            <label for="mCode">Код</label>
            <input type="text" id="mCode" class="input" placeholder="a22"/>
          </div>
        </div>
        <div class="field">
          <label for="mPlatform">Площадка</label>
          <select id="mPlatform" class="select"></select>
        </div>
        <div class="field">
          <label for="mTariff">Тариф</label>
          <select id="mTariff" class="select"></select>
          <div id="mTariffDesc" style="font-size:12px;color:var(--text-mute);margin-top:4px"></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="mOrdered">Заказано (отзывов)</label>
            <input type="number" id="mOrdered" class="input" value="0" min="0"/>
          </div>
          <div class="field">
            <label for="mDone">Сделано</label>
            <input type="number" id="mDone" class="input" value="0" min="0"/>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="mPaid">Оплачено, ₽</label>
            <input type="number" id="mPaid" class="input" value="0" min="0" step="100"/>
          </div>
          <div class="field">
            <label for="mTotal">Итог, ₽</label>
            <input type="number" id="mTotal" class="input" value="0" min="0" step="100"/>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="mDate">Дата старта</label>
            <input type="date" id="mDate" class="input"/>
          </div>
          <div class="field">
            <label for="mDeadline">Дедлайн</label>
            <input type="date" id="mDeadline" class="input"/>
          </div>
        </div>
        <div class="field">
          <label for="mAssigned">Email сотрудника</label>
          <input type="email" id="mAssigned" class="input" placeholder="nastya@mentori.local — кому назначить анкету"/>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>Отмена</button>
        <button class="btn btn--primary" id="mSave">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модалка истории платежей -->
  <div class="modal-backdrop" id="paymentsModal">
    <div class="modal" style="max-width:560px">
      <div class="modal__header">
        <h3 id="payTitle">История платежей</h3>
        <button class="btn--icon" data-close>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <div id="paySummary" style="display:flex;gap:10px;margin-bottom:14px"></div>
        <div id="payList"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>Закрыть</button>
        <a class="btn btn--primary" href="finance.html" id="payToFinance">+ Добавить платёж</a>
      </div>
    </div>
  </div>

  <script src="../data/seed.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/cloud-sync.js"></script>
  <script src="../js/accounts-sync.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/header.js"></script>
  <script src="../components/table.js"></script>

  <script>
  /* ========================================================================
     Клиенты: тариф через dropdown, счётчики +/− для заказано/сделано
     ======================================================================== */
  document.addEventListener('DOMContentLoaded', () => {
    const { Store, Modal, Counter, toast, fmtMoney, fmtDate, todayISO,
            SERVICES, TARIFFS, TARIFF_NAMES } = window.App;
    const { makeEditable, confirmDelete } = window.TableUtils;

    Store.load();
    const filters = { tariff: '', state: '', q: '' };

    /* ---- Заполнение селектов в модалке ---- */
    document.getElementById('mPlatform').innerHTML =
      `<option value="">— не указана —</option>` + SERVICES.map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('mTariff').innerHTML =
      TARIFFS.map(t => `<option value="${t.name}">${t.name} — ${t.price.toLocaleString('ru-RU')} ₽</option>`).join('');

    document.getElementById('mTariff').addEventListener('change', e => {
      const t = TARIFFS.find(x => x.name === e.target.value);
      document.getElementById('mTariffDesc').textContent = t ? t.desc : '';
    });

    /* ---- Селект фильтра по тарифам ---- */
    function refreshFilterOptions() {
      const tf = document.getElementById('fTariff');
      const keep = tf.value;
      tf.innerHTML = '<option value="">Все тарифы</option>' +
        TARIFF_NAMES.map(t => `<option value="${t}">${t}</option>`).join('');
      tf.value = TARIFF_NAMES.includes(keep) ? keep : '';
    }

    /* ---- KPI ---- */
    function renderKpis(rows) {
      const total = rows.reduce((s, r) => s + (+r.total || 0), 0);
      const paid = rows.reduce((s, r) => s + (+r.paid || 0), 0);
      const remain = rows.reduce((s, r) => s + (+r.remain || 0), 0);
      const overdue = rows.filter(r => (+r.overdueDays || 0) > 0).length;
      const inProgress = rows.filter(r => (+r.ordered||0) > (+r.done||0)).length;
      document.getElementById('clKpis').innerHTML = `
        <div class="card"><div class="card__label">Клиентов</div><div class="card__value">${rows.length}</div></div>
        <div class="card"><div class="card__label">В работе</div><div class="card__value">${inProgress}</div></div>
        <div class="card"><div class="card__label">Оплачено</div><div class="card__value pos">${fmtMoney(paid)}</div></div>
        <div class="card"><div class="card__label">Остаток</div><div class="card__value ${remain>0?'neg':''}">${fmtMoney(remain)}</div></div>
        <div class="card"><div class="card__label">Просрочка</div><div class="card__value ${overdue>0?'neg':''}">${overdue}</div><div class="card__trend">клиентов</div></div>
      `;
    }

    /* ---- Фильтрация ---- */
    function getFiltered() {
      return Store.state.clients.filter(r => {
        if (filters.tariff && r.tariff !== filters.tariff) return false;
        if (filters.q) {
          const s = (r.name + ' ' + r.code + ' ' + r.platform + ' ' + r.tariff).toLowerCase();
          if (!s.includes(filters.q)) return false;
        }
        if (filters.state) {
          const ordered = +r.ordered||0, done = +r.done||0, remain = +r.remain||0, overdue = +r.overdueDays||0;
          if (filters.state === 'overdue' && overdue <= 0) return false;
          if (filters.state === 'done' && !(ordered > 0 && done >= ordered)) return false;
          if (filters.state === 'active' && !(ordered > 0 && done < ordered)) return false;
          if (filters.state === 'unpaid' && remain <= 0) return false;
        }
        return true;
      });
    }

    function render() {
      refreshFilterOptions();
      const rows = getFiltered();
      const tbody = document.getElementById('clRows');
      const tfoot = document.getElementById('clFoot');

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="13" class="empty">Нет клиентов под фильтр.</td></tr>`;
        tfoot.innerHTML = '';
      } else {
        tbody.innerHTML = rows.map(r => rowHtml(r)).join('');
        const totalBilled = rows.reduce((s, r) => s + (+r.total || 0), 0);
        const totalPaid = rows.reduce((s, r) => s + (+r.paid || 0), 0);
        const totalRemain = rows.reduce((s, r) => s + (+r.remain || 0), 0);
        const totalOrdered = rows.reduce((s, r) => s + (+r.ordered || 0), 0);
        const totalDone = rows.reduce((s, r) => s + (+r.done || 0), 0);
        tfoot.innerHTML = `
          <tr>
            <td colspan="4">ИТОГО</td>
            <td class="num">${totalOrdered}</td>
            <td class="num">${totalDone}</td>
            <td class="num">${totalOrdered ? Math.round(totalDone/totalOrdered*100) : 0}%</td>
            <td class="num pos">${fmtMoney(totalPaid)}</td>
            <td class="num ${totalRemain>0?'neg':''}">${fmtMoney(totalRemain)}</td>
            <td colspan="4"></td>
          </tr>`;
        bindRowEditors();
      }
      renderKpis(rows);
    }

    function rowHtml(r) {
      const ordered = +r.ordered || 0;
      const done = +r.done || 0;
      const pct = ordered > 0 ? Math.min(100, Math.round(done / ordered * 100)) : 0;
      const overdue = +r.overdueDays || 0;
      const remain = +r.remain || 0;
      const progressBar = `
        <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
          <div style="flex:1;max-width:80px;height:6px;background:var(--bg-elev-2);border-radius:6px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg, var(--accent), #ff9a3c)"></div>
          </div>
          <span style="font-variant-numeric:tabular-nums;color:var(--text-dim);font-size:12px">${pct}%</span>
        </div>`;
      return `
        <tr data-id="${r.id}">
          <td><span class="badge badge--gray">${escapeHtml(r.code || '—')}</span></td>
          <td data-field="name"><strong>${escapeHtml(r.name || '—')}</strong></td>
          <td>
            <select class="select" style="padding:4px 8px" data-field="platform">
              <option value="">—</option>
              ${SERVICES.map(s => `<option value="${s}" ${r.platform===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </td>
          <td>
            <select class="select" style="padding:4px 8px" data-field="tariff">
              ${TARIFF_NAMES.map(t => `<option value="${t}" ${r.tariff===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </td>
          <td class="num">${Counter.html(ordered, { id: r.id + ':ordered' })}</td>
          <td class="num">${Counter.html(done, { id: r.id + ':done', max: ordered })}</td>
          <td class="num">${progressBar}</td>
          <td class="num pos" data-field="paid" data-type="number">${r.paid || 0}</td>
          <td class="num ${remain>0?'neg':''}" data-field="remain" data-type="number">${r.remain || 0}</td>
          <td>
            <input type="date" class="input" style="padding:4px 6px;background:transparent;border:1px solid transparent" data-field="deadline" value="${r.deadline || ''}"/>
            ${overdue > 0 ? `<div style="font-size:11px;color:var(--red);margin-top:2px">−${overdue} дн.</div>` : ''}
          </td>
          <td data-field="assignedEmail" data-type="email">${escapeHtml(r.assignedEmail || '')}</td>
          <td>${statusBadge(r)}</td>
          <td class="actions">
            <button class="btn btn--ghost btn--sm" data-act="payments" title="История платежей">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:3px;vertical-align:middle"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span class="btn-label">Платежи (${Store.getPaymentsForClient(r.id).length})</span>
            </button>
            <button class="btn--icon" data-act="del" title="Удалить">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </button>
          </td>
        </tr>`;
    }

    function statusBadge(r) {
      const ordered = +r.ordered||0, done = +r.done||0, remain = +r.remain||0, overdue = +r.overdueDays||0;
      if (overdue > 0) return '<span class="badge badge--red"><span class="dot"></span>Просрочка</span>';
      if (ordered > 0 && done >= ordered && remain <= 0) return '<span class="badge badge--green"><span class="dot"></span>Завершён</span>';
      if (remain > 0 && done >= ordered && ordered > 0) return '<span class="badge badge--orange"><span class="dot"></span>Долг</span>';
      if (ordered > 0 && done < ordered) return '<span class="badge badge--orange"><span class="dot"></span>В работе</span>';
      return '<span class="badge badge--gray"><span class="dot"></span>Ожидает</span>';
    }

    function bindRowEditors() {
      document.querySelectorAll('#clRows tr').forEach(tr => {
        const id = tr.dataset.id;

        // Counter handlers
        Counter.bindAll(tr, (cid) => (newVal) => {
          const [, field] = cid.split(':');
          const patch = { [field]: newVal };
          // если уменьшили "ordered" ниже текущего "done" — done тоже подрежется
          if (field === 'ordered') {
            const c = Store.state.clients.find(x => x.id === id);
            if ((c.done || 0) > newVal) patch.done = newVal;
          }
          Store.updateClient(id, patch);
          render();
        });

        // text/number cells
        tr.querySelectorAll('td[data-field]').forEach(cell => {
          if (cell.querySelector('input,select')) return;
          const field = cell.dataset.field;
          makeEditable(cell, val => {
            const patch = { [field]: val };
            if (field === 'paid' || field === 'total') {
              const c = Store.state.clients.find(x => x.id === id);
              const paid = field === 'paid' ? Number(val) : Number(c.paid) || 0;
              const total = field === 'total' ? Number(val) : Number(c.total) || 0;
              if (total > 0) patch.remain = Math.max(0, total - paid);
            }
            Store.updateClient(id, patch);
            render();
          }, { type: cell.dataset.type === 'number' ? 'number' : 'text' });
        });

        // dropdowns
        tr.querySelectorAll('select[data-field]').forEach(sel => {
          sel.addEventListener('change', e => {
            Store.updateClient(id, { [sel.dataset.field]: e.target.value });
            render();
          });
        });

        // date
        const dateInput = tr.querySelector('input[data-field="deadline"]');
        if (dateInput) dateInput.addEventListener('change', e => {
          Store.updateClient(id, { deadline: e.target.value });
          render();
        });

        // delete
        tr.querySelector('[data-act="del"]').addEventListener('click', () => {
          if (confirmDelete('Удалить клиента?')) {
            Store.deleteClient(id);
            toast('Клиент удалён');
            render();
          }
        });

        // история платежей
        tr.querySelector('[data-act="payments"]').addEventListener('click', () => openPayments(id));
      });
    }

    /* ---- Модалка истории платежей ---- */
    function openPayments(clientId) {
      const c = Store.state.clients.find(x => x.id === clientId);
      if (!c) return;
      const payments = Store.getPaymentsForClient(clientId);
      const totalPaid = payments.reduce((s, p) => s + (Number(p.amount) || 0), 0);
      const remain = Math.max(0, (Number(c.total) || 0) - (Number(c.paid) || 0));

      document.getElementById('payTitle').textContent =
        `Платежи · ${c.code ? c.code + ' · ' : ''}${c.name || 'Клиент'}`;

      document.getElementById('paySummary').innerHTML = `
        <div class="card card--compact" style="flex:1;margin:0">
          <div class="card__label">Всего оплачено</div>
          <div class="card__value pos">${fmtMoney(c.paid || 0)}</div>
        </div>
        <div class="card card--compact" style="flex:1;margin:0">
          <div class="card__label">Платежей</div>
          <div class="card__value">${payments.length}</div>
        </div>
        <div class="card card--compact" style="flex:1;margin:0">
          <div class="card__label">Остаток</div>
          <div class="card__value ${remain>0?'neg':''}">${fmtMoney(remain)}</div>
        </div>
      `;

      const list = document.getElementById('payList');
      if (payments.length === 0) {
        list.innerHTML = `<div class="empty" style="padding:24px;text-align:center;color:var(--text-mute)">
          Платежей по этой анкете ещё не было.<br/>
          <span style="font-size:11px">Добавьте платёж в разделе «Финансы» с привязкой к этой анкете.</span>
        </div>`;
      } else {
        list.innerHTML = `
          <table class="table" style="min-width:auto">
            <thead><tr><th>Дата</th><th>Услуга</th><th class="num">Сумма</th></tr></thead>
            <tbody>
              ${payments.map(p => `
                <tr>
                  <td>${fmtDate(p.date)}</td>
                  <td><span class="badge badge--orange">${escapeHtml(p.service || '—')}</span></td>
                  <td class="num pos"><strong>${fmtMoney(p.amount)}</strong></td>
                </tr>`).join('')}
            </tbody>
            <tfoot>
              <tr><td colspan="2"><strong>ИТОГО</strong></td>
                  <td class="num pos"><strong>${fmtMoney(totalPaid)}</strong></td></tr>
            </tfoot>
          </table>`;
      }

      Modal.open('paymentsModal');
    }

    /* ---- Фильтры ---- */
    document.getElementById('fTariff').addEventListener('change', e => { filters.tariff = e.target.value; render(); });
    document.getElementById('fState').addEventListener('change',  e => { filters.state = e.target.value; render(); });
    document.getElementById('fSearch').addEventListener('input',  e => { filters.q = e.target.value.trim().toLowerCase(); render(); });
    document.getElementById('btnReset').addEventListener('click', () => {
      filters.tariff = filters.state = filters.q = '';
      ['fTariff','fState','fSearch'].forEach(id => document.getElementById(id).value = '');
      render();
    });
    window.onGlobalSearch = (q) => { filters.q = q; document.getElementById('fSearch').value = q; render(); };

    /* ---- Модалка ---- */
    document.getElementById('btnAdd').addEventListener('click', () => {
      ['mName','mCode','mAssigned'].forEach(id => document.getElementById(id).value = '');
      ['mOrdered','mDone','mPaid','mTotal'].forEach(id => document.getElementById(id).value = '0');
      document.getElementById('mPlatform').value = '';
      document.getElementById('mTariff').value = TARIFF_NAMES[0];
      document.getElementById('mTariffDesc').textContent = TARIFFS[0].desc;
      document.getElementById('mDate').value = todayISO();
      document.getElementById('mDeadline').value = '';
      Modal.open('addModal');
      setTimeout(() => document.getElementById('mName').focus(), 60);
    });
    document.getElementById('mSave').addEventListener('click', () => {
      const name = document.getElementById('mName').value.trim();
      if (!name) { toast('Укажите имя клиента', 'error'); return; }
      const paid = Number(document.getElementById('mPaid').value) || 0;
      const total = Number(document.getElementById('mTotal').value) || 0;
      Store.addClient({
        name,
        code:     document.getElementById('mCode').value.trim(),
        platform: document.getElementById('mPlatform').value,
        tariff:   document.getElementById('mTariff').value,
        ordered:  Number(document.getElementById('mOrdered').value) || 0,
        done:     Number(document.getElementById('mDone').value) || 0,
        paid, total,
        remain:   Math.max(0, total - paid),
        date:     document.getElementById('mDate').value,
        deadline: document.getElementById('mDeadline').value,
        assignedEmail: document.getElementById('mAssigned').value.trim().toLowerCase(),
        overdueDays: 0
      });
      Modal.close('addModal');
      toast('Клиент добавлен');
      render();
    });

    render();
  });

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  </script>
</body>
</html>
