<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Вход — Mentori</title>
  <link rel="stylesheet" href="../../css/styles.css"/>
  <link rel="stylesheet" href="employee.css"/>
</head>
<body class="emp-body">
  <main class="emp-login">
    <div class="emp-login__card">
      <div class="emp-login__brand">
        <div class="emp-login__logo">M</div>
        <div>
          <h1>Mentori</h1>
          <p>Вход для сотрудника</p>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" class="input" autocomplete="username" placeholder="nastya@mentori.local"/>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" class="input" autocomplete="current-password" placeholder="••••••••"/>
      </div>

      <button id="btnLogin" class="btn btn--primary" style="width:100%">Войти</button>
      <div id="err" class="emp-login__err" hidden></div>
    </div>
  </main>

  <script src="../../js/supabase-client.js"></script>
  <script>
  (async () => {
    const { Auth } = window.Supabase;

    // если уже залогинен — сразу в кабинет
    if (Auth.isLogged()) { location.replace('./index.html'); return; }
    // попробуем refresh — на случай протухшего access_token
    if (await Auth.refresh()) { location.replace('./index.html'); return; }

    const err = document.getElementById('err');
    function showErr(msg) { err.textContent = msg; err.hidden = false; }

    async function submit() {
      err.hidden = true;
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pwd   = document.getElementById('password').value;
      if (!email || !pwd) return showErr('Введите email и пароль');

      const btn = document.getElementById('btnLogin');
      btn.disabled = true; btn.textContent = 'Входим…';
      try {
        await Auth.signIn(email, pwd);
        location.replace('./index.html');
      } catch (e) {
        showErr(e.message || 'Не удалось войти');
        btn.disabled = false; btn.textContent = 'Войти';
      }
    }

    document.getElementById('btnLogin').addEventListener('click', submit);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    document.getElementById('email').addEventListener('keydown',    e => { if (e.key === 'Enter') submit(); });
  })();
  </script>
</body>
</html>
